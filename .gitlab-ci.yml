stages:
  - quality
  - build
  - docker
  - deploy

default:
  interruptible: true

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

variables:
  NODE_IMAGE: node:22-alpine
  KANIKO_IMAGE: gcr.io/kaniko-project/executor:v1.23.2-debug
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

frontend:lint:
  stage: quality
  image: $NODE_IMAGE
  script:
    - npm ci --prefer-offline
    - npm run lint
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

frontend:build:
  stage: build
  image: $NODE_IMAGE
  script:
    - npm ci --prefer-offline
    - npm run build
  artifacts:
    name: "frontend-dist-$CI_COMMIT_REF_SLUG"
    expire_in: 7 days
    paths:
      - dist/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

frontend:docker:
  stage: docker
  image:
    name: $KANIKO_IMAGE
    entrypoint: [""]
  needs:
    - frontend:build
  before_script:
    - mkdir -p /kaniko/.docker
    - >
      printf '{"auths":{"%s":{"username":"%s","password":"%s"}}}'
      "$CI_REGISTRY" "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD"
      > /kaniko/.docker/config.json
  script:
    - |
      DESTINATIONS="--destination=${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA} --destination=${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_SLUG}"
      if [ "${CI_COMMIT_BRANCH:-}" = "${CI_DEFAULT_BRANCH}" ]; then
        DESTINATIONS="${DESTINATIONS} --destination=${CI_REGISTRY_IMAGE}:latest"
      fi
      /kaniko/executor \
        --context "${CI_PROJECT_DIR}" \
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile" \
        --build-arg VITE_API_BASE_URL="${VITE_API_BASE_URL:-}" \
        --build-arg VITE_KEYCLOAK_URL="${VITE_KEYCLOAK_URL:-}" \
        --build-arg VITE_KEYCLOAK_REALM="${VITE_KEYCLOAK_REALM:-}" \
        --build-arg VITE_KEYCLOAK_CLIENT_ID="${VITE_KEYCLOAK_CLIENT_ID:-}" \
        --build-arg VITE_KEYCLOAK_FLOW="${VITE_KEYCLOAK_FLOW:-}" \
        ${DESTINATIONS}
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

.frontend:deploy-template:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - |
      if [ -n "${SSH_PRIVATE_KEY_B64:-}" ]; then
        echo "$SSH_PRIVATE_KEY_B64" | base64 -d | tr -d '\r' > ~/.ssh/id_ed25519
      else
        echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
      fi
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - >
      ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "
      set -eu &&
      docker login -u '${CI_REGISTRY_USER}' -p '${CI_REGISTRY_PASSWORD}' '${CI_REGISTRY}' &&
      docker pull '${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}' &&
      docker stop '${FRONTEND_CONTAINER_NAME}' || true &&
      docker rm '${FRONTEND_CONTAINER_NAME}' || true &&
      docker run -d --name '${FRONTEND_CONTAINER_NAME}' --restart unless-stopped
      -p '${FRONTEND_HOST_PORT}:80' '${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}'
      "
  needs:
    - frontend:docker

frontend:deploy:staging:
  extends: .frontend:deploy-template
  environment:
    name: staging
  variables:
    DEPLOY_HOST: $STAGING_DEPLOY_HOST
    DEPLOY_USER: $STAGING_DEPLOY_USER
    FRONTEND_CONTAINER_NAME: rms-frontend-staging
    FRONTEND_HOST_PORT: "3000"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop" && ($SSH_PRIVATE_KEY || $SSH_PRIVATE_KEY_B64) && $STAGING_DEPLOY_HOST && $STAGING_DEPLOY_USER

frontend:deploy:production:
  extends: .frontend:deploy-template
  environment:
    name: production
  variables:
    DEPLOY_HOST: $PROD_DEPLOY_HOST
    DEPLOY_USER: $PROD_DEPLOY_USER
    FRONTEND_CONTAINER_NAME: rms-frontend
    FRONTEND_HOST_PORT: "80"
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && ($SSH_PRIVATE_KEY || $SSH_PRIVATE_KEY_B64) && $PROD_DEPLOY_HOST && $PROD_DEPLOY_USER
