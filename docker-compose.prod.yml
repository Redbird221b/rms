services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-risk-management-system}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-}
        VITE_KEYCLOAK_FLOW: ${VITE_KEYCLOAK_FLOW:-}
    image: riskapp-frontend:prod
    container_name: riskapp-frontend
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "${FRONTEND_HOST_PORT:-80}:80"
    networks:
      - riskapp-network

networks:
  riskapp-network:
    name: riskapp-network
    external: true
